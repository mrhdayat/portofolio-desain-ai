<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oula Ad Carousel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #ffb8d1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Outfit', sans-serif; color: #fff; overflow-x: hidden; }
        
        .slides {
            display: flex;
            scroll-snap-type: x mandatory;
            overflow-x: scroll;
            height: 100vh;
            width: 100vw;
        }

        .slide {
            min-width: 100vw;
            height: 100vh;
            position: relative;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7);
        }

        .content {
            position: absolute;
            z-index: 2;
            text-align: center;
        }

        .content h2 {
            font-size: 15vh;
            line-height: 0.8;
            margin-bottom: 1rem;
        }

        .content p {
            font-size: 2rem;
            color: var(--accent);
            letter-spacing: 5px;
        }

        /* Custom layouts per slide */
        .slide-2 img { object-position: top; }
        .slide-3 { background: #0a0a0a; }
        .slide-3 .img-split {
            display: flex;
            gap: 20px;
            width: 80%;
            height: 70%;
        }
        .img-split img { filter: brightness(1); border-radius: 20px; }

        .hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="hint">SCROLL RIGHT →</div>
    <div class="slides">
        <div class="slide slide-1">
            <img src="../Advertising_photo_new_pose_202605121657.jpeg" alt="">
            <div class="content">
                <h2>MOVE<br>FAST</h2>
                <p>OULA ACTIVE 2026</p>
            </div>
        </div>
        <div class="slide slide-2">
            <img src="../Advertising_photo_new_pose_202605121657_3.jpeg" alt="">
            <div class="content">
                <h2>PRECISION</h2>
                <p>DETAIL MATTERS</p>
            </div>
        </div>
        <div class="slide slide-3">
            <div class="img-split">
                <img src="../Advertising_photo_new_pose_202605121658 (1).jpeg" alt="">
                <img src="../Advertising_photo_new_pose_202605121658 (2).jpeg" alt="">
            </div>
        </div>
    </div>
</body>
</html>
