<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oula Portfolio Cover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #ffb8d1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); overflow: hidden; font-family: 'Outfit', sans-serif; color: #fff; }
        
        .container {
            display: grid;
            grid-template-columns: 3fr 2fr 2fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            width: 100vw;
            gap: 10px;
            padding: 10px;
        }

        .item { position: relative; overflow: hidden; border-radius: 8px; }
        .item img { width: 100%; height: 100%; object-fit: cover; }

        .item-main { grid-row: span 2; }
        .item-2 { grid-column: 2; }
        .item-3 { grid-column: 3; }
        .item-4 { grid-column: 2 / span 2; }

        /* Typography Overlays */
        .brand {
            position: absolute;
            top: 50%;
            left: -5%;
            transform: translateY(-50%) rotate(-90deg);
            font-size: 15vh;
            color: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            letter-spacing: 20px;
        }

        .badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            font-weight: 900;
            letter-spacing: 2px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(255, 184, 209, 0.3);
        }

        .tagline {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-size: 2rem;
            max-width: 300px;
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="brand">OULA</div>
    <div class="container">
        <div class="item item-main">
            <img src="../Advertising_photo_new_pose_202605121657.jpeg" alt="">
            <div class="tagline">STUDIO<br>ESSENTIALS<br>2026</div>
        </div>
        <div class="item item-2">
            <img src="../Advertising_photo_new_pose_202605121657_2.jpeg" alt="">
        </div>
        <div class="item item-3">
            <img src="../Woman_interacting_with_product_202605121657.jpeg" alt="">
        </div>
        <div class="item item-4">
            <img src="../Advertising_photo_new_pose_202605121658.jpeg" alt="">
            <div class="badge">AD CAMPAIGN</div>
        </div>
    </div>
</body>
</html>
